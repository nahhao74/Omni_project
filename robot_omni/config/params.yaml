amcl:
  ros__parameters:
    use_sim_time: True
    # Tọa độ TF chuẩn
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    
    # Dữ liệu đầu vào
    scan_topic: "scan_front_raw"
    map_topic: "map"
    
    # Cài đặt ban đầu (Bật True để map hiện ra ngay lập tức)
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: -1.57
      
    # Mô hình chuyển động đa hướng cho xe Omni
    robot_model_type: "nav2_amcl::OmniMotionModel"
    
    # Cấu hình đám mây hạt (Particle Cloud)
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    update_min_a: 0.15
    update_min_d: 0.15
    resample_interval: 1
    transform_tolerance: 2.0
    
    # Các hệ số nhiễu (Alpha)
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # Thông số Laser
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    tf_broadcast: true

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      
      # 🔥 THÊM DÒNG NÀY (Khai báo 4 góc xe, giả sử xe 50x50cm)
      footprint: "[ [0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25] ]"
      
      rolling_window: false
      width: 10
      height: 10
      resolution: 0.05

      plugins: ["static_layer", "VoxelLayer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      VoxelLayer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        
        # =========================================================
        # 🔥 THÔNG SỐ KHỞI TẠO MẢNG 3D (BẮT BUỘC PHẢI CÓ CHO VOXEL)
        # =========================================================
        z_resolution: 0.1           # Độ cao của mỗi "cục gạch" 3D là 10cm
        z_voxels: 15                # Xếp chồng 15 cục lên nhau (tổng chiều cao = 1.5m)
        origin_z: 0.0               # Bắt đầu xếp gạch từ mặt đất (0.0)
        publish_voxel_map: True     # Phóng dữ liệu 3D ra để xem trên RViz
        mark_threshold: 0           # Mức độ nhạy (0: Cứ có điểm ảnh lọt vào là đánh dấu luôn)
        footprint_clearing_enabled: True # Cực kỳ quan trọng: Tự xóa mây điểm kẹt dưới gầm xe
        # =========================================================

        observation_sources: scan scan_rear camera_pointcloud
        
        scan:
          topic: /scan_front_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

        scan_rear:
          topic: /scan_rear_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

        camera_pointcloud:
          topic: /camera/points         
          data_type: "PointCloud2"      
          marking: True                 
          clearing: True             
          min_obstacle_height: 0.4    
          max_obstacle_height: 1.5      
          obstacle_max_range: 8.0       
          raytrace_max_range: 9.0


      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 🔥 TĂNG TỪ 0.55 LÊN 1.2 (Sương mù tỏa ra tít ngoài xa)
        inflation_radius: 1.0     
        # 🔥 GIẢM MẠNH TỪ 25.0 XUỐNG 3.0 (Ép A* tìm chỗ nào chi phí thấp nhất -> chính giữa hành lang)
        cost_scaling_factor: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      
      # 🔥 THÊM DÒNG NÀY NỮA
      footprint: "[ [0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25] ]"
      
      resolution: 0.05

      # IMPORTANT for local behavior
      rolling_window: true
      width: 8
      height: 8

      plugins: ["VoxelLayer", "inflation_layer"] # Thêm obstacle_layer

      VoxelLayer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        
        # =========================================================
        # 🔥 THÔNG SỐ KHỞI TẠO MẢNG 3D (BẮT BUỘC PHẢI CÓ CHO VOXEL)
        # =========================================================
        z_resolution: 0.1           # Độ cao của mỗi "cục gạch" 3D là 10cm
        z_voxels: 15                # Xếp chồng 15 cục lên nhau (tổng chiều cao = 1.5m)
        origin_z: 0.0               # Bắt đầu xếp gạch từ mặt đất (0.0)
        publish_voxel_map: True     # Phóng dữ liệu 3D ra để xem trên RViz
        mark_threshold: 0           # Mức độ nhạy (0: Cứ có điểm ảnh lọt vào là đánh dấu luôn)
        footprint_clearing_enabled: True # Cực kỳ quan trọng: Tự xóa mây điểm kẹt dưới gầm xe
        # =========================================================

        observation_sources: scan scan_rear camera_pointcloud
        
        scan:
          topic: /scan_front_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

        scan_rear:
          topic: /scan_rear_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

        camera_pointcloud:
          topic: /camera/points         
          data_type: "PointCloud2"      
          marking: True                 
          clearing: True             
          min_obstacle_height: 0.4    
          max_obstacle_height: 1.5      
          obstacle_max_range: 8.0       
          raytrace_max_range: 9.0
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 🔥 Giữ nguyên để xe tự tin chui qua khe hẹp
        inflation_radius: 0.35      
        cost_scaling_factor: 10.0
        

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    
    # 🔥 TĂNG TỪ 0.22 LÊN 0.38 (Ép A* vẽ đường đỏ cách xa góc tường ra)
    robot_radius: 0.38
    
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D" # In Iron and older versions, "/" was used instead of "::"
      tolerance: 0.125                      # tolerance for planning if unable to reach exact pose, in meters
      downsample_costmap: false             # whether or not to downsample the map
      downsampling_factor: 1                # multiplier for the resolution of the costmap layer (e.g. 2 on a 5cm costmap would be 10cm)
      allow_unknown: true                   # allow traveling in unknown space
      max_iterations: 1000000               # maximum total iterations to search for before failing (in case unreachable), set to -1 to disable
      max_on_approach_iterations: 1000      # maximum number of iterations to attempt to reach goal once in tolerance
      max_planning_time: 2.0                # max time in s for planner to plan, smooth
      cost_travel_multiplier: 10.0           # Cost multiplier to apply to search to steer away from high cost areas. Larger values will place in the center of aisles more exactly (if non-`FREE` cost potential field exists) but take slightly longer to compute. To optimize for speed, a value of 1.0 is reasonable. A reasonable tradeoff value is 2.0. A value of 0.0 effective disables steering away from obstacles and acts like a naive binary search A*.
      use_final_approach_orientation: false # Whether to set the final path pose at the goal's orientation to the requested orientation (false) or in line with the approach angle so the robot doesn't rotate to heading (true)
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 30.0
    costmap_update_timeout: 0.3
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: "/odometry/filtered"
    odom_duration: 0.3
    enable_stamped_cmd_vel: True
    progress_checker_plugins: ["progress_checker"] # progress_checker_plugin: "progress_checker" For Humble and older
    goal_checker_plugins: ["goal_checker"] # goal_checker_plugin: "goal_checker" For Galactic and older
    path_handler_plguins: ["PathHandler"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 2.5
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.6
      path_length_tolerance: 1.0
      stateful: True
    PathHandler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 2.0
      enforce_path_inversion: True
      enforce_path_rotation: False
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      minimum_rotation_angle: 0.785
      reject_unit_path: False  
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      
      # 1. ĐIỀN CHUỖI TÊN CLASS C++ CỦA LỚP ĐIỀU KHIỂN CHÍNH
      # primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      
      # # 2. THÔNG SỐ CỦA LỚP VỎ (ROTATION SHIM)
      # angular_dist_threshold: 0.785
      # forward_sampling_distance: 0.5
      # angular_disengage_threshold: 0.3925
      # rotate_to_heading_angular_vel: 1.8
      # max_angular_accel: 3.2
      # simulate_ahead_time: 1.0
      # rotate_to_goal_heading: false
      
      # # 3. THÔNG SỐ CỦA LỚP LÕI (RPP) ĐƯỢC TRẢI PHẲNG NGANG HÀNG
      # max_linear_vel: 2.0
      # min_linear_vel: -0.5
      # max_angular_vel: 2.5
      # min_angular_vel: -2.5
      # max_linear_accel: 2.5
      # max_linear_decel: -2.5
      # max_angular_decel: -3.2
      # lookahead_dist: 0.6
      # min_lookahead_dist: 0.3
      # max_lookahead_dist: 0.9
      # lookahead_time: 1.5
      # use_velocity_scaled_lookahead_dist: false
      # min_approach_linear_velocity: 0.05
      # approach_velocity_scaling_dist: 0.6
      # use_collision_detection: true
      # max_allowed_time_to_collision_up_to_carrot: 1.0
      # use_regulated_linear_velocity_scaling: true
      # use_fixed_curvature_lookahead: false
      # curvature_lookahead_dist: 0.25
      # use_cost_regulated_linear_velocity_scaling: false
      # cost_scaling_dist: 0.3
      # cost_scaling_gain: 1.0
      # regulated_linear_scaling_min_radius: 0.9
      # regulated_linear_scaling_min_speed: 0.25
      # use_rotate_to_heading: true
      # allow_reversing: false
      # rotate_to_heading_min_angle: 0.785
      # min_distance_to_obstacle: 0.0
      # stateful: true
      # use_dynamic_window: false
      # allow_obstacle_checking_beyond_goal: false
      primary_controller: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 6.0
      vx_min: -0.35
      vy_max: 0.5
      wz_max: 1.9
      ax_max: 3.0
      ax_min: -3.0
      ay_min: -3.0
      ay_max: 3.0
      az_max: 4.5
      iteration_count: 1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      critic_index_to_visualize: 0
      reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      AckermannConstraints:
        min_turning_r: 0.2
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      # ObstaclesCritic:
      #   enabled: true
      #   cost_power: 1
      #   repulsion_weight: 1.5
      #   critical_weight: 20.0
      #   consider_footprint: false
      #   collision_cost: 10000.0
      #   collision_margin_distance: 0.1
      #   near_goal_distance: 0.5
      #   inflation_radius: 0.55 # (only in Humble)
      #   cost_scaling_factor: 10.0 # (only in Humble)
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      # VelocityDeadbandCritic:
      #   enabled: true
      #   cost_power: 1
      #   cost_weight: 35.0
      #   deadband_velocities: [0.05, 0.05, 0.05]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0


smoother_server:
  ros__parameters:
    costmap_topic: global_costmap/costmap_raw
    footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_link
    transform_tolerance: 0.1
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      do_refinement: True
      refinement_num: 2
      max_its: 1000
      w_data: 0.2
      w_smooth: 0.3
      enforce_path_inversion: True

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # MẢNG LÀ [X, Y, THETA]. ĐÃ MỞ KHÓA Y:
    max_velocity: [5.0, 0.0, 2.0]     
    min_velocity: [-1.0, 0.0, -2.0]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [2.5, 0.0, 5.0]        
    max_decel: [-2.5, 0.0, -5.0]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    use_realtime_priority: false
    enable_stamped_cmd_vel: true
    stamp_smoothed_velocity_with_smoothing_time: false

collision_monitor:
  ros__parameters:
    enabled: True
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/mobile_base_controller/reference"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: True  # False for Jazzy or older
    use_realtime_priority: false
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    PolygonStop:
      type: "circle"
      radius: 0.22
      action_type: "stop"
      min_points: 4  # max_points: 3 for Humble
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: false
    PolygonSlow:
      type: "polygon"
      # 🔥 BÓP CHIỀU RỘNG TỪ 1.0 XUỐNG 0.35 (Tổng rộng 70cm, vừa đủ bao bọc nhẹ ngoài thân xe)
      points: "[[0.6, 0.35], [0.6, -0.35], [-0.5, -0.35], [-0.5, 0.35]]"
      action_type: "slowdown"
      min_points: 4  
      slowdown_ratio: 1.0
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: False

    PolygonLimit:
      type: "polygon"
      points: "[[0.5, 0.5], [0.5, -0.5], [-0.5, -0.5], [-0.5, 0.5]]"
      action_type: "limit"
      min_points: 4  # max_points: 3 for Humble
      linear_limit: 5.0
      angular_limit: 1.0
      visualize: True
      polygon_pub_topic: "polygon_limit"
      enabled: True

    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.0
      simulation_time_step: 0.02
      min_points: 6  # max_points: 5 for Humble
      visualize: False
      enabled: True
    VelocityPolygonStop:
      type: "velocity_polygon"
      action_type: "stop"
      min_points: 6
      visualize: True
      enabled: True
      polygon_pub_topic: "velocity_polygon_stop"
      velocity_polygons: ["rotation", "translation_forward", "translation_backward", "stopped"]
      holonomic: false
      rotation:
        points: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
        linear_min: 0.0
        linear_max: 0.05
        theta_min: -1.0
        theta_max: 1.0
      translation_forward:
        points: "[[0.35, 0.25], [0.35, -0.25], [-0.2, -0.25], [-0.2, 0.25]]"
        linear_min: 0.0
        linear_max: 1.5
        theta_min: -1.0
        theta_max: 1.0
      translation_backward:
        points: "[[0.2, 0.3], [0.2, -0.3], [-0.35, -0.3], [-0.35, 0.3]]"
        linear_min: -1.0
        linear_max: 0.0
        theta_min: -1.0
        theta_max: 1.0
      # This is the last polygon to be checked, it should cover the entire range of robot's velocities
      # It is used as the stopped polygon when the robot is not moving and as a fallback if the velocity
      # is not covered by any of the other sub-polygons
      stopped:
        points: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
        linear_min: -1.5
        linear_max: 1.5
        theta_min: -1.0
        theta_max: 1.0
    observation_sources: ["scan", "pointcloud"]
    scan:
      source_timeout: 0.2
      type: "scan"
      topic: "/scan_front_raw"
      enabled: True
    pointcloud:
      type: "pointcloud"
      topic: "/intel_realsense_r200_depth/points"
      transport_type: "raw"  # raw or/ with compression (zlib, draco, zstd)
      min_height: 0.1
      max_height: 0.5
      min_range: 0.2
      enabled: False
    # costmap:
    #   type: "costmap"   # relative, respects namespaces
    #   topic: "local_costmap/costmap"
    #   cost_threshold: 254
    #   enabled: True
    #   treat_unknown_as_obstacle: True

docking_server:
  ros__parameters:
    use_sim_time: true
    base_frame: "base_link"
    odom_frame: "odom"
    dock_plugins: ["simple_dock"]
    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.5
      use_battery_status: false

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors::Spin" # In Iron and older versions, "/" was used instead of "::"
    backup:
      plugin: "nav2_behaviors::BackUp" # In Iron and older versions, "/" was used instead of "::"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading" # In Iron and older versions, "/" was used instead of "::"
    wait:
      plugin: "nav2_behaviors::Wait" # In Iron and older versions, "/" was used instead of "::"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop" # In Iron and older versions, "/" was used instead of "::"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    

    max_rotational_vel: 1.0     # Tăng từ 1.0 lên 2.0
    min_rotational_vel: -1.0
    rotational_acc_lim: 3.2     # Tăng từ 3.2 lên 5.0 để xe xoay đầu chớp nhoáng
    
    enable_stamped_cmd_vel: true
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ['map_server', 'amcl']

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ['planner_server', 'controller_server', 'smoother_server', 'behavior_server', 'bt_navigator']