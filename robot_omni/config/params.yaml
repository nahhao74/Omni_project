amcl:
  ros__parameters:
    use_sim_time: True
    # Tọa độ TF chuẩn
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    
    # Dữ liệu đầu vào
    scan_topic: "scan_front_filtered"
    map_topic: "map"
    
    # Cài đặt ban đầu (Bật True để map hiện ra ngay lập tức)
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: -1.57
      
    # Mô hình chuyển động đa hướng cho xe Omni
    robot_model_type: "nav2_amcl::OmniMotionModel"
    
    # Cấu hình đám mây hạt (Particle Cloud)
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    transform_tolerance: 2.0
    
    # Các hệ số nhiễu (Alpha)
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # Thông số Laser
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    tf_broadcast: true

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      
      # 🔥 BỔ SUNG DÒNG NÀY 
      transform_tolerance: 1.0
      
      footprint: "[ [0.25, 0.23], [0.25, -0.23], [-0.25, -0.23], [-0.25, 0.23] ]"
      rolling_window: false
      width: 10
      height: 10
      resolution: 0.05

      plugins: ["static_layer", "VoxelLayer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      VoxelLayer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        
        # =========================================================
        # 🔥 THÔNG SỐ KHỞI TẠO MẢNG 3D (BẮT BUỘC PHẢI CÓ CHO VOXEL)
        # =========================================================
        z_resolution: 0.1           # Độ cao của mỗi "cục gạch" 3D là 10cm
        z_voxels: 15                # Xếp chồng 15 cục lên nhau (tổng chiều cao = 1.5m)
        origin_z: 0.0               # Bắt đầu xếp gạch từ mặt đất (0.0)
        publish_voxel_map: False    # Phóng dữ liệu 3D ra để xem trên RViz
        mark_threshold: 3     # Mức độ nhạy (0: Cứ có điểm ảnh lọt vào là đánh dấu luôn)
        footprint_clearing_enabled: True # Cực kỳ quan trọng: Tự xóa mây điểm kẹt dưới gầm xe
        # =========================================================

        observation_sources: scan scan_rear camera_pointcloud
        
        scan:
          topic: /scan_front_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 6.0
          raytrace_max_range: 7.0

        scan_rear:
          topic: /scan_rear_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 6.0
          raytrace_max_range: 7.0

        camera_pointcloud:
          topic: /camera/points         
          data_type: "PointCloud2"      
          marking: True                 
          clearing: True       
          # 🔥 TĂNG min_obstacle_height để không quét trúng sàn
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5
          # 🔥 Thu hẹp tầm quét để máy không bị lag do nhìn quá xa
          obstacle_max_range: 3.0   
          # 🔥 TĂNG tầm quét tia để xóa vật cản cũ khi xe đã đi qua
          raytrace_max_range: 6.0


      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        
        plugin: "nav2_costmap_2d::InflationLayer"
        # 🔥 GIẢM XUỐNG 0.7 (Vừa đủ để bao quanh thân xe 70cm)
        inflation_radius: 0.7     
        # 🔥 TĂNG LÊN 3.0 để lực đẩy bớt gắt, xe dám đi vào chỗ hẹp hơn
        cost_scaling_factor: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      
      transform_tolerance: 0.5
      
      footprint: "[ [0.25, 0.23], [0.25, -0.23], [-0.25, -0.23], [-0.25, 0.23] ]"
      resolution: 0.05
      rolling_window: true
      width: 8
      height: 8
      plugins: ["VoxelLayer", "inflation_layer"]

      VoxelLayer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        decay_model: "linear"
        voxel_decay: 60.0
        z_resolution: 0.1
        z_voxels: 15
        origin_z: 0.0
        
        # 🔥 TẮT XUẤT 3D ĐỂ MÁY NHẸ BƯỚC, KHÔNG BỊ GIẬT
        publish_voxel_map: False     
        
        mark_threshold: 3    
        footprint_clearing_enabled: True
        # =========================================================

        observation_sources: scan scan_rear camera_pointcloud
        
        can:
          topic: /scan_front_filtered
          # 🔥 HẠ XUỐNG 0.4: Lidar 2D chỉ quản lý một lát cắt mỏng ngang thân nó
          min_obstacle_height: 0.1
          max_obstacle_height: 0.4
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0    
          obstacle_max_range: 3.0

        scan_rear:
          topic: /scan_rear_raw
          # 🔥 TƯƠNG TỰ CHO LIDAR SAU
          min_obstacle_height: 0.1
          max_obstacle_height: 0.4
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0    
          obstacle_max_range: 3.0

        camera_pointcloud:
          topic: /camera/points         
          data_type: "PointCloud2"      
          marking: True                 
          clearing: True       
          # 🔥 TĂNG min_obstacle_height để không quét trúng sàn
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5
          # 🔥 Thu hẹp tầm quét để máy không bị lag do nhìn quá xa
          raytrace_max_range: 3.0    # ĐỂ BẰNG VỚI OBSTACLE
          obstacle_max_range: 3.0
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5     
        cost_scaling_factor: 3.0

scan_front_filter:
  ros__parameters:
    filter1:
      name: speckle_filter
      type: laser_filters/LaserScanSpeckleFilter
      params:
        filter_type: 0            # 0: Dựa trên khoảng cách (Distance)
        max_range: 3.0            # Khoảng cách tối đa Lidar hoạt động
        max_range_difference: 0.2 # Ngưỡng chênh lệch khoảng cách giữa các tia
        filter_window: 3
        

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    robot_radius: 0.35
    
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 1.0
      allow_unknown: true
      
      # 🔥 TĂNG MẠNH LÊN 5.0 (Thay vì 0.8)
      # Lệnh này "phạt" cực nặng những con đường đi sát vật cản, 
      # ép xe phải lượn ra vùng trống (giữa hành lang) để an toàn.
      cost_travel_multiplier: 5.0  
      
      use_final_approach_orientation: true
      downsample_costmap: false
      downsampling_factor: 2

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    
    # 🔥 TĂNG TỪ 0.3 LÊN 1.0: Cho phép bản đồ lag 1 giây cũng không hủy
    costmap_update_timeout: 1.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    
    # 🔥 TĂNG TỪ 0.3 LÊN 1.0: Cho phép thuật toán lag 1 giây mới báo lỗi
    failure_tolerance: 1.0
    
    odom_topic: "/odometry/filtered"
    odom_duration: 0.3
    enable_stamped_cmd_vel: True
    progress_checker_plugins: ["progress_checker"] # progress_checker_plugin: "progress_checker" For Humble and older
    goal_checker_plugins: ["goal_checker"] # goal_checker_plugin: "goal_checker" For Galactic and older
    path_handler_plguins: ["PathHandler"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 2.5
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.5
      path_length_tolerance: 1.0
      stateful: True
    PathHandler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 2.0
      enforce_path_inversion: True
      enforce_path_rotation: False
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      minimum_rotation_angle: 0.785
      reject_unit_path: False  
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.7            # Tốc độ đi thẳng tối đa (m/s)
      lookahead_dist: 0.35              # Khoảng cách quăng "củ cà rốt" về phía trước
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.5
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8  # Tốc độ xoay đầu tại chỗ
      transform_tolerance: 1.0
      
      # Các cơ chế tự động giảm tốc độ cho mượt
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      
      # Cơ chế tránh va chạm
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      
      # Tự động đi chậm lại khi vào cua hoặc gần tường
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      
      # 🔥 VŨ KHÍ BÍ MẬT: Đứng im xoay đầu khi góc rẽ gắt
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.2   # 🔥 tăng mạnh
      max_angular_accel: 3.2
      
      # Cấm đi lùi (Để ép xe luôn hướng mũi về phía trước)
      allow_reversing: false

smoother_server:
  ros__parameters:
    costmap_topic: global_costmap/costmap_raw
    footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_link
    transform_tolerance: 1.0
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      do_refinement: True
      refinement_num: 2
      max_its: 1000
      w_data: 0.1
      w_smooth: 0.5
      enforce_path_inversion: True

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # MẢNG LÀ [X, Y, THETA]. ĐÃ MỞ KHÓA Y:
    max_velocity: [1.0, 0.0, 2.0]     
    min_velocity: [-1.0, 0.0, -2.0]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [2.5, 0.0, 5.0]        
    max_decel: [-2.5, 0.0, -5.0]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    use_realtime_priority: false
    enable_stamped_cmd_vel: true
    stamp_smoothed_velocity_with_smoothing_time: false  # ONLY IN JAZZY

collision_monitor:
  ros__parameters:
    enabled: True
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/mobile_base_controller/reference"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0
    source_timeout: 5.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: True
    use_realtime_priority: false
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    PolygonStop:
      type: "circle"
      radius: 0.22
      action_type: "stop"
      min_points: 4  
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    PolygonSlow:
      type: "polygon"
      # 🔥 Hộp xanh đã được gọt dũa cẩn thận
      points: "[[0.35, 0.28], [0.35, -0.28], [-0.25, -0.28], [-0.25, 0.28]]"
      action_type: "slowdown"
      min_points: 4  
      slowdown_ratio: 0.5   
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: True
    PolygonLimit:
      type: "polygon"
      points: "[[0.5, 0.5], [0.5, -0.5], [-0.5, -0.5], [-0.5, 0.5]]"
      action_type: "limit"
      min_points: 4  
      linear_limit: 0.4
      angular_limit: 0.5
      visualize: True
      polygon_pub_topic: "polygon_limit"
      enabled: True
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.02
      min_points: 6  
      visualize: False
      enabled: True
    VelocityPolygonStop:
      type: "velocity_polygon"
      action_type: "stop"
      min_points: 6
      visualize: True
      enabled: True
      polygon_pub_topic: "velocity_polygon_stop"
      velocity_polygons: ["rotation", "translation_forward", "translation_backward", "stopped"]
      holonomic: false
      rotation:
        points: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
        linear_min: 0.0
        linear_max: 0.05
        theta_min: -1.0
        theta_max: 1.0
      translation_forward:
        points: "[[0.35, 0.25], [0.35, -0.25], [-0.2, -0.25], [-0.2, 0.25]]"
        linear_min: 0.0
        linear_max: 1.0
        theta_min: -1.0
        theta_max: 1.0
      translation_backward:
        points: "[[0.2, 0.3], [0.2, -0.3], [-0.35, -0.3], [-0.35, 0.3]]"
        linear_min: -1.0
        linear_max: 0.0
        theta_min: -1.0
        theta_max: 1.0
      stopped:
        points: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
        linear_min: -1.0
        linear_max: 1.0
        theta_min: -1.0
        theta_max: 1.0
    observation_sources: ["scan", "pointcloud"]
    scan:
      source_timeout: 0.2
      type: "scan"
      topic: /scan_front_filtered
      enabled: True
    pointcloud:
      type: "pointcloud"
      topic: "/intel_realsense_r200_depth/points"
      transport_type: "raw"  
      min_height: 0.1
      max_height: 0.5
      min_range: 0.2
      enabled: False
    # costmap:
    #   type: "costmap"   # relative, respects namespaces
    #   topic: "local_costmap/costmap"
    #   cost_threshold: 254
    #   enabled: True
    #   treat_unknown_as_obstacle: True

docking_server:
  ros__parameters:
    use_sim_time: true
    base_frame: "base_link"
    odom_frame: "odom"
    dock_plugins: ["simple_dock"]
    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.5
      use_battery_status: false

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors::Spin" # In Iron and older versions, "/" was used instead of "::"
    backup:
      plugin: "nav2_behaviors::BackUp" # In Iron and older versions, "/" was used instead of "::"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading" # In Iron and older versions, "/" was used instead of "::"
    wait:
      plugin: "nav2_behaviors::Wait" # In Iron and older versions, "/" was used instead of "::"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop" # In Iron and older versions, "/" was used instead of "::"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 1.0
    simulate_ahead_time: 2.0
    
    # 🔥 TĂNG ĐỒNG BỘ VỚI DWB VÀ SMOOTHER HÔM TRƯỚC
    max_rotational_vel: 1.0    # Tăng từ 1.0 lên 2.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 5.0 

    
    enable_stamped_cmd_vel: true
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ['map_server', 'amcl']

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ['planner_server', 'controller_server', 'smoother_server', 'behavior_server', 'bt_navigator']